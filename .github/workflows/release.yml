name: Release

# Triggers only when manifest.json actually changes on main — not on every
# push (e.g. README-only commits), since a release is only meaningful when
# the version Obsidian reads from manifest.json has actually moved.
on:
  push:
    branches: [main]
    paths:
      - manifest.json

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - name: Read manifest version
        id: manifest
        run: echo "version=$(node -p "require('./manifest.json').version")" >> "$GITHUB_OUTPUT"

      - name: Skip if this version was already released
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.manifest.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.manifest.outputs.version }}" \
            main.js manifest.json \
            --title "${{ steps.manifest.outputs.version }}" \
            --notes "Automated release for version ${{ steps.manifest.outputs.version }}. See the commit history for details."
